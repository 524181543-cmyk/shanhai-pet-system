services:
  - type: web
    name: shanhai-pet-system
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py -m http -p $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
    healthCheckPath: /health
    autoDeploy: false
